version: '3.8'

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: api
    ports:
      - "8000:8000"
    env_file: .env
    restart: always

  extractor:
    build:
      context: .
      dockerfile: Dockerfile.extractor
    container_name: extractor
    env_file: .env
    restart: always

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: scheduler
    env_file: .env
    restart: always

  consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: consumer
    env_file: .env
    restart: always
