services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api
    command: [ "uvicorn", "src.ops_solution:app", "--host", "0.0.0.0", "--port", "8000", "--log-config", "uvicorn_log_config.json" ]
    ports:
      - "8000:8000"
    env_file: .env
    restart: always
    dns:
      - 8.8.8.8
    logging:
      driver: "json-file"
      options:
        max-size: "50m"   # Rotate when file hits 50 MB
        max-file: "5"     # Keep 5 rotated files (250 MB max total)

  extractor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: extractor
    command: [ "python", "src/email-extract-app.py" ]
    env_file: .env
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consumer
    command: [ "python", "src/error-solution-create.py" ]
    env_file: .env
    restart: always
    dns:
      - 8.8.8.8
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
